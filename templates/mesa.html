<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa {{ mesa[0] }} - Atendimento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-container {
            background: #ffffff;
            width: 100%;
            max-width: 650px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            padding: 30px;
            border: 1px solid #e2e8f0;
        }

        .header-mesa {
            text-align: center;
            margin-bottom: 24px;
        }

        .header-mesa h1 {
            font-size: 26px;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .badge-status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-status.disponivel {
            background-color: #d1fae5;
            color: #065f46;
        }

        .badge-status.ocupada {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .acoes-topo {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-liberar {
            background-color: #10b981;
            color: white;
        }

        .btn-liberar:hover {
            background-color: #059669;
        }

        .btn-voltar {
            background-color: #64748b;
            color: white;
        }

        .btn-voltar:hover {
            background-color: #475569;
        }

        .divisor {
            height: 1px;
            background-color: #e2e8f0;
            margin: 25px 0;
        }

        .secao-titulo {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Formulário */
        .form-pedido {
            display: grid;
            grid-template-columns: 1fr 110px auto;
            gap: 10px;
            margin-bottom: 25px;
        }

        @media (max-width: 580px) {
            .form-pedido {
                grid-template-columns: 1fr;
            }
        }

        .grupo-input {
            display: flex;
            flex-direction: column;
        }

        .grupo-input label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 5px;
        }

        /* ADICIONADO: .grupo-input select para herdar os mesmos estilos do input */
        .grupo-input input, .grupo-input select {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background-color: white;
        }

        .grupo-input input:focus, .grupo-input select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-adicionar {
            background-color: #3b82f6;
            color: white;
            align-self: flex-end;
            height: 42px;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-adicionar:hover {
            background-color: #2563eb;
        }

        /* Tabela de Pedidos */
        .tabela-pedidos {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .tabela-pedidos th {
            background-color: #f8fafc;
            color: #64748b;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        .tabela-pedidos td {
            padding: 12px;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .tabela-pedidos tr:hover td {
            background-color: #f8fafc;
        }

        .sem-pedidos {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 14px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="card-container">
        
        <!-- Cabeçalho da Mesa -->
        <div class="header-mesa">
            <h1>Mesa {{ mesa[0] }}</h1>
            <span class="badge-status {% if mesa[1]|lower == 'ocupada' %}ocupada{% else %}disponivel{% endif %}">
                Status: {{ mesa[1] }}
            </span>
        </div>

        <!-- Botões de Ação Superior -->
        <div class="acoes-topo">
            <a href="/liberar_mesa/{{ mesa[0] }}" class="btn btn-liberar">
                <i class="fa-solid fa-check-circle"></i> Liberar Mesa
            </a>
            <a href="/vendas" class="btn btn-voltar">
                <i class="fa-solid fa-arrow-left"></i> Voltar ao Mapa
            </a>
        </div>

        <div class="divisor"></div>

        <!-- Formulário para Lançar Pedido -->
        <div class="secao-titulo">
            <i class="fa-solid fa-cart-plus" style="color: #3b82f6;"></i> Lançar Pedido
        </div>

        <form action="/adicionar_pedido/{{ mesa[0] }}" method="POST" class="form-pedido">
            <div class="grupo-input">
                <label for="produto">Produto</label>
                <!-- O input de texto foi removido e substituído por este Select -->
                <select id="produto" name="produto" required>
                    <option value="" disabled selected>Selecione um produto...</option>
                    
                    {% for categoria, lista_produtos in produtos_por_categoria.items() %}

                    <optgroup label="{{ categoria }}"></optgroup>
                    {% for prod in lista_produtos %}
                    <option value="{{ prod.nome }}">{{ prod.nome }}</option>
            {% endfor %}
        </optgroup>
        {% endfor %}
                </select>
            </div>
            <div class="grupo-input">
                <label for="quantidade">Qtd</label>
                <input type="number" id="quantidade" name="quantidade" value="1" min="1" required>
            </div>
            <button type="submit" class="btn-adicionar">
                <i class="fa-solid fa-plus"></i> Adicionar
            </button>
        </form>

        <!-- Lista / Tabela de Pedidos Atuais -->
        <div class="secao-titulo" style="margin-top: 25px;">
            <i class="fa-solid fa-receipt" style="color: #3b82f6;"></i> Comanda da Mesa
        </div>

        {% if pedidos %}
            <div style="overflow-x: auto;">
                <table class="tabela-pedidos">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th style="text-align: center; width: 100px;">Qtd</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for pedido in pedidos %}
                            <tr>
                                <td>{{ pedido[0] }}</td>
                                <td style="text-align: center; font-weight: bold;">{{ pedido[1] }}</td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        {% else %}
            <div class="sem-pedidos">
                <i class="fa-regular fa-clipboard" style="font-size: 24px; margin-bottom: 5px; display: block;"></i>
                Nenhum pedido anotado para esta mesa ainda.
            </div>
        {% endif %}

    </div>

</body>
</html>
