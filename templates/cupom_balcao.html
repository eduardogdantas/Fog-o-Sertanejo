<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cupom Balcão - {{ produto }}</title>
    <style>
        /* Estilo para simular papel de bobina térmica */
        body {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #000;
            margin: 0;
            padding: 15px;
            width: 300px;
        }
        .center {
            text-align: center;
        }
        .divisor {
            border-top: 1px dashed #000;
            margin: 10px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 2px 0;
        }
        .text-right {
            text-align: right;
        }
        .bold {
            font-weight: bold;
        }
        @media print {
            body { width: auto; padding: 0; }
        }
    </style>
</head>
<body onload="window.print(); window.onafterprint = function(){ window.close(); }">

    <div class="center bold">
        <h2>FOGÃO SERTANEJO</h2>
        <p>CNPJ: 00.000.000/0001-00</p>
        <p>CUPOM DE VENDA (BALCÃO)</p>
    </div>

    <div class="divisor"></div>
    <p><b>Data:</b> {{ data_hora }}</p>
    <p><b>Pgto:</b> {{ pagamento }}</p>
    <div class="divisor"></div>

    <table>
        <thead>
            <tr>
                <th>Qtd</th>
                <th>Produto</th>
                <th class="text-right">Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ quantidade }}x</td>
                <td>{{ produto }}</td>
                <td class="text-right">R$ {{ "%.2f"|format(total) }}</td>
            </tr>
        </tbody>
    </table>

    <div class="divisor"></div>
    
    <table>
        <tr>
            <td class="bold">TOTAL A PAGAR:</td>
            <td class="text-right bold">R$ {{ "%.2f"|format(total) }}</td>
        </tr>
    </table>

    <div class="divisor"></div>
    <p class="center">Obrigado pela preferência!</p>
    <p class="center">Volte sempre.</p>

</body>
</html>
